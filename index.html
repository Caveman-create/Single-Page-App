<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wordly SPA Dictionary</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <header>
      <h1>Wordly Dictionary</h1>
      <p class="subtitle">Search words, meanings, and pronunciation instantly</p>
    </header>

    <form id="search-form">
      <input
        type="text"
        id="word-input"
        placeholder="Type a word (e.g. innovation)"
      />
      <button type="submit">Search</button>
    </form>

    <div id="error" class="error"></div>

    <div id="results" class="results"></div>

  </div>

  <script src="index.js"></script>
</body>
</html>
